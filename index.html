<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stroop Sync Bypass</title>
    <style>
        body {
            margin: 0;
            background: #0b0c10;
            color: #ffffff;
            font-family: system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .header { margin-bottom: 25px; }
        .score-board { font-size: 24px; color: #1f2833; color: #45f3ff; font-weight: bold; }
        .timer-display { font-size: 20px; color: #ff4a4a; margin: 5px; }
        
        #role-badge { padding: 8px 20px; border-radius: 20px; font-weight: bold; font-size: 16px; margin-bottom: 20px; text-transform: uppercase; }
        
        /* Layout Modules */
        .pane { display: none; background: #1f2833; border: 1px solid #c5a059; border-radius: 12px; padding: 40px; width: 320px; box-sizing: border-box; text-align: center; }
        
        /* The Stroop Target Word */
        #stroop-target {
            font-size: 64px;
            font-weight: 900;
            letter-spacing: 2px;
            margin: 20px 0;
        }

        /* Choice Buttons for Terminal Interface */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }
        .choice-btn {
            background: #0b0c10;
            border: 2px solid #45f3ff;
            color: #ffffff;
            padding: 20px 10px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            -webkit-user-select: none;
            user-select: none;
        }
        .choice-btn:active { background: #45f3ff; color: #000; }
        
        #feedback-msg { font-size: 20px; color: #ffff00; margin-top: 25px; font-weight: bold; min-height: 50px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="score-board">TEAM COMPLIANCE: <span id="score-val">0</span></div>
        <div class="timer-display">STABILITY WINDOW: <span id="timer-val">7</span>s</div>
    </div>

    <div id="role-badge">Calibrating matrix...</div>

    <!-- MONITOR PANEL (Transmitter) -->
    <div id="monitor-pane" class="pane">
        <div style="color: #66fcf1; font-size: 14px; font-weight: bold;">SAY THE INK COLOR ALOUD:</div>
        <div id="stroop-target">WORD</div>
    </div>

    <!-- TERMINAL PANEL (Receiver) -->
    <div id="terminal-pane" class="pane">
        <div style="color: #66fcf1; font-size: 14px; font-weight: bold; margin-bottom: 15px;">SELECT SPANNING COLOR MATCH:</div>
        <div class="options-grid" id="buttons-container"></div>
    </div>

    <div id="feedback-msg">Waiting for nodes to align...</div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myId = null;
        let currentTargetColor = "";

        // Standard web-safe high-contrast color dictionary
        const COLOR_MAP = {
            'RED': '#ff3333',
            'BLUE': '#3377ff',
            'GREEN': '#33cc33',
            'YELLOW': '#ffff33',
            'ORANGE': '#ff9933',
            'PURPLE': '#cc33ff'
        };

        socket.on('connect', () => { myId = socket.id; });

        socket.on('roundStart', (data) => {
            document.getElementById('score-val').innerText = data.score;
            document.getElementById('timer-val').innerText = data.timeLeft;
            document.getElementById('feedback-msg').innerText = "System Synced";
            document.getElementById('feedback-msg').style.color = "#ffff00";

            const me = data.players[myId];
            const roleBadge = document.getElementById('role-badge');
            const monitorPane = document.getElementById('monitor-pane');
            const terminalPane = document.getElementById('terminal-pane');
            
            currentTargetColor = data.challenge.color;

            if (me.role === 'Monitor') {
                roleBadge.innerText = "Role: Core Scanner";
                roleBadge.style.backgroundColor = "#1f3a60";
                monitorPane.style.display = "block";
                terminalPane.style.display = "none";

                // Set up the target word layout with the mismatched ink color
                const wordElement = document.getElementById('stroop-target');
                wordElement.innerText = data.challenge.text;
                wordElement.style.color = COLOR_MAP[data.challenge.color];
            } else {
                roleBadge.innerText = "Role: Core Interceptor";
                roleBadge.style.backgroundColor = "#601f3a";
                monitorPane.style.display = "none";
                terminalPane.style.display = "block";

                // Render options buttons cleanly
                const container = document.getElementById('buttons-container');
                container.innerHTML = '';
                data.challenge.choices.forEach(colorName => {
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn';
                    btn.innerText = colorName;
                    btn.onclick = () => socket.emit('submitSelection', colorName, currentTargetColor);
                    container.appendChild(btn);
                });
            }
        });

        socket.on('timerUpdate', (time) => {
            document.getElementById('timer-val').innerText = time;
        });

        socket.on('roundOver', (result) => {
            const feedback = document.getElementById('feedback-msg');
            feedback.innerText = result.reason;
            feedback.style.color = result.success ? '#66fcf1' : '#ff4a4a';
        });
    </script>
</body>
</html>
