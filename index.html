<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cognitive Assessment Interface</title>
    <style>
        body {
            margin: 0;
            background: #ffffff;
            color: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        .meta-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #666666;
            margin-bottom: 40px;
            border-bottom: 1px solid #eeeeee;
            padding-bottom: 10px;
        }
        .role-indicator {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #888888;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        
        /* Main Card Modules */
        .display-area { display: none; margin: 40px 0; }
        
        /* Stimulus Word */
        #stimulus-text {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        /* Choice Configurations */
        .choices-vertical {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .response-button {
            background: #f8f9fa;
            border: 1px solid #e2e8f0;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.15s ease;
        }
        .response-button:active { background: #edf2f7; }
        
        #feedback-log {
            font-size: 14px;
            font-weight: 500;
            color: #666666;
            margin-top: 40px;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="meta-row">
            <div>Score: <span id="score-val" style="font-weight:600; color:#1a1a1a;">0</span></div>
            <div>Remaining: <span id="timer-val" style="font-weight:600; color:#1a1a1a;">7</span>s</div>
        </div>

        <div id="role-indicator" class="role-indicator">Initializing Session...</div>

        <!-- Presenter Mode View -->
        <div id="presenter-view" class="display-area">
            <div id="stimulus-text">WORD</div>
        </div>

        <!-- Responder Mode View -->
        <div id="responder-view" class="display-area">
            <div class="choices-vertical" id="choices-container"></div>
        </div>

        <div id="feedback-log">Awaiting secondary connection...</div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myId = null;

        const HEX_MAP = {
            'RED': '#dc2626',
            'BLUE': '#2563eb',
            'GREEN': '#16a34a',
            'YELLOW': '#ca8a04',
            'ORANGE': '#ea580c',
            'PURPLE': '#9333ea'
        };

        socket.on('connect', () => { myId = socket.id; });

        socket.on('roundStart', (data) => {
            document.getElementById('score-val').innerText = data.score;
            document.getElementById('timer-val').innerText = data.timeLeft;
            document.getElementById('feedback-log').innerText = "";

            const activeIdentity = data.players[myId];
            const indicator = document.getElementById('role-indicator');
            const pView = document.getElementById('presenter-view');
            const rView = document.getElementById('responder-view');

            if (activeIdentity.role === 'Presenter') {
                indicator.innerText = "Read ink color out loud";
                pView.style.display = "block";
                rView.style.display = "none";

                const target = document.getElementById('stimulus-text');
                target.innerText = data.task.presenterText;
                target.style.color = HEX_MAP[data.task.presenterColor];
            } else {
                indicator.innerText = "Select target item matching vocal prompt";
                pView.style.display = "none";
                rView.style.display = "block";

                const container = document.getElementById('choices-container');
                container.innerHTML = '';
                
                data.task.responderChoices.forEach(item => {
                    const btn = document.createElement('button');
                    btn.className = 'response-button';
                    btn.innerText = item.text;
                    btn.style.color = HEX_MAP[item.color];
                    btn.onclick = () => socket.emit('verifyChoice', item.isCorrect);
                    container.appendChild(btn);
                });
            }
        });

        socket.on('timerUpdate', (time) => {
            document.getElementById('timer-val').innerText = time;
        });

        socket.on('roundOver', (result) => {
            document.getElementById('feedback-log').innerText = result.reason;
        });
    </script>
</body>
</html>
