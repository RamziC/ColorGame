<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Color Game</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #fff;
            color: #111;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            font-size: 15px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 32px 24px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
        }
        .header-title {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #111;
        }
        .header-stats {
            font-size: 13px;
            color: #555;
        }
        .header-stats b { color: #111; }

        /* Game timer bar (90s) */
        .game-track {
            height: 2px;
            background: #e5e5e5;
            margin-bottom: 6px;
        }
        .game-fill {
            height: 100%;
            background: #111;
            width: 100%;
            transition: width 1s linear, background 0.3s;
        }
        .game-fill.low { background: #c00; }

        /* Round timer bar (7s) */
        .round-track {
            height: 2px;
            background: #e5e5e5;
            margin-bottom: 40px;
        }
        .round-fill {
            height: 100%;
            background: #bbb;
            width: 100%;
            transition: width 1s linear;
        }

        /* Role label */
        .role-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #999;
            margin-bottom: 36px;
        }

        /* Presenter word */
        #presenter-view { display: none; text-align: center; }
        #stimulus-text {
            font-size: 64px;
            font-weight: 700;
            letter-spacing: -1px;
            line-height: 1;
        }

        /* Responder choices — 2x2 grid */
        #responder-view { display: none; }
        .choices-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .choice-btn {
            background: #fff;
            border: 1px solid #ddd;
            padding: 20px 8px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.1s, border-color 0.1s;
        }
        .choice-btn:hover    { background: #f5f5f5; border-color: #bbb; }
        .choice-btn:active   { background: #ececec; }
        .choice-btn:disabled { opacity: 0.4; cursor: default; }

        /* Feedback */
        #feedback {
            margin-top: 28px;
            font-size: 13px;
            font-weight: 600;
            min-height: 20px;
        }
        #feedback.correct { color: #1a7f3c; }
        #feedback.wrong   { color: #c00; }

        /* Overlay screens */
        .screen { display: none; text-align: center; padding: 20px 0; }
        .screen h2 { font-size: 20px; font-weight: 600; color: #111; }
        .screen p  { margin-top: 8px; font-size: 14px; color: #666; line-height: 1.7; }
        .screen .final-score {
            font-size: 48px;
            font-weight: 700;
            margin: 20px 0 4px;
        }
        .screen .final-label {
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #999;
        }
    </style>
</head>
<body>
<div class="container">

    <div id="waiting-screen" class="screen" style="display:block">
        <h2>Waiting for player 2…</h2>
    </div>

    <div id="spectator-screen" class="screen">
        <h2>Game in progress</h2>
        <p>Refresh to try again later.</p>
    </div>

    <div id="partner-left-screen" class="screen">
        <h2>Partner disconnected</h2>
        <p>Refresh to start over.</p>
    </div>

    <div id="gameover-screen" class="screen">
        <h2>Game over</h2>
        <div class="final-score" id="final-score">0</div>
        <div class="final-label">points</div>
        <p style="margin-top:20px">Refresh to play again.</p>
    </div>

    <div id="main-game" style="display:none">
        <div class="header">
            <div class="header-title">Color Game</div>
            <div class="header-stats">Score <b id="score-val">0</b> &nbsp;·&nbsp; <b id="game-timer-val">90</b>s</div>
        </div>

        <!-- 90s game bar -->
        <div class="game-track"><div class="game-fill" id="game-fill"></div></div>
        <!-- 7s round bar -->
        <div class="round-track"><div class="round-fill" id="round-fill"></div></div>

        <div id="role-label" class="role-label"></div>

        <div id="presenter-view">
            <div id="stimulus-text">—</div>
        </div>

        <div id="responder-view">
            <div class="choices-grid" id="choices-container"></div>
        </div>

        <div id="feedback"></div>
    </div>

</div>
<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let myId = null;
    let totalRoundTime = 7;
    const TOTAL_GAME_TIME = 90;

    const COLOR_CSS = {
        RED:    '#cc2222',
        BLUE:   '#1a56cc',
        GREEN:  '#1a8a3a',
        YELLOW: '#b58a00',
        ORANGE: '#cc5500',
        PURPLE: '#6b21a8',
        PINK:   '#c0267a',
        CYAN:   '#0891b2',
        BROWN:  '#7c4a1e',
        GRAY:   '#666666'
    };

    function showScreen(id) {
        ['waiting-screen','spectator-screen','partner-left-screen','gameover-screen','main-game']
            .forEach(s => {
                const el = document.getElementById(s);
                el.style.display = (s === id) ? (el.classList.contains('screen') ? 'block' : '') : 'none';
            });
    }

    function setRoundBar(t) {
        document.getElementById('round-fill').style.width = (t / totalRoundTime * 100) + '%';
    }

    function setGameBar(t) {
        const fill = document.getElementById('game-fill');
        fill.style.width = (t / TOTAL_GAME_TIME * 100) + '%';
        fill.classList.toggle('low', t <= 15);
    }

    socket.on('connect',     () => myId = socket.id);
    socket.on('waiting',     () => showScreen('waiting-screen'));
    socket.on('spectator',   () => showScreen('spectator-screen'));
    socket.on('partnerLeft', () => showScreen('partner-left-screen'));

    socket.on('gameOver', (data) => {
        document.getElementById('final-score').innerText = data.score;
        showScreen('gameover-screen');
    });

    socket.on('roundStart', (data) => {
        showScreen('main-game');
        document.getElementById('score-val').innerText = data.score;
        document.getElementById('game-timer-val').innerText = data.gameTimeLeft;
        document.getElementById('feedback').innerText = '';
        document.getElementById('feedback').className = '';
        totalRoundTime = data.timeLeft;
        setRoundBar(data.timeLeft);
        setGameBar(data.gameTimeLeft);

        const role = data.players[myId]?.role;
        document.getElementById('role-label').innerText = role === 'Presenter' ? 'Presenter' : 'Responder';

        const pView = document.getElementById('presenter-view');
        const rView = document.getElementById('responder-view');

        if (role === 'Presenter') {
            pView.style.display = 'block';
            rView.style.display = 'none';
            const el = document.getElementById('stimulus-text');
            el.innerText = data.task.presenterText;
            el.style.color = COLOR_CSS[data.task.presenterColor];
        } else {
            pView.style.display = 'none';
            rView.style.display = 'block';
            const container = document.getElementById('choices-container');
            container.innerHTML = '';
            data.task.responderChoices.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerText = item.text;
                btn.style.color = COLOR_CSS[item.color];
                btn.onclick = () => {
                    container.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
                    socket.emit('submitChoice', item.index);
                };
                container.appendChild(btn);
            });
        }
    });

    socket.on('timerUpdate', (t) => {
        setRoundBar(t);
    });

    socket.on('gameTimerUpdate', (t) => {
        document.getElementById('game-timer-val').innerText = t;
        setGameBar(t);
    });

    socket.on('roundOver', (result) => {
        const fb = document.getElementById('feedback');
        fb.innerText = result.reason;
        fb.className = result.success ? 'correct' : 'wrong';
        if (result.success)
            document.getElementById('score-val').innerText =
                parseInt(document.getElementById('score-val').innerText) + 10;
    });
</script>
</body>
</html>
